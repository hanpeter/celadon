# Fly.io deployment configuration for celadon.
#
# Deployment flow (managed by GitHub Actions on tag pushes v*):
#   1. Build and push two images to GHCR: celadon:<TAG> and celadon-migrator:<TAG>
#   2. 'migrate' job: flyctl machine run celadon-migrator:<TAG> -a celadon --rm --command "apply"
#      - Runs in Fly private network; inherits DATABASE_URL secret (flycast host)
#      - Applies pending yoyo migrations; idempotent no-op if none pending
#   3. 'deploy' job: flyctl deploy --image celadon:<TAG>
#
# First-time setup:
#   1. Set the DATABASE_URL secret:
#        flyctl secrets set DATABASE_URL="postgres://celadon:<password>@<postgres-app-name>.flycast:5432/celadon" -a celadon
#   2. Push a v* tag — migrations run automatically before the app is deployed.

app = "celadon"
primary_region = "lax"

[build]
  image = "ghcr.io/hanpeter/celadon:latest"

[env]
  PORT = "8080"
  TMPDIR = "/tmp"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 2

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
