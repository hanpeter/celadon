---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.application.name }}-database-init-scripts
  labels:
    app.kubernetes.io/name: {{ .Values.application.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    app.kubernetes.io/component: database
data:
  initdb.sql: |
    {{- required "helm/files/initdb.sql is missing — copy db/init_db.sql into helm/files/ before rendering" (.Files.Get "files/initdb.sql") | indent 4 }}
