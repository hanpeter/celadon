{{- if .Values.database.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "celadon.database.name" . }}
  labels: {{- include "celadon.database.labels" . | nindent 4 }}
  annotations: {{- include "celadon.annotations" . | nindent 4 }}
data:
  {{- range $key, $val := .Values.database.initScripts }}
  {{ $key }}: |
    {{- tpl $val $ | nindent 4 }}
  {{- end }}
{{- end }}
